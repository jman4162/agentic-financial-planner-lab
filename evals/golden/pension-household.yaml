# Synthetic golden eval case. All figures invented.
name: pension-household
simulate: true
case:
  case_id: g-pension
  created: '2026-01-15'
  question: Does my pension change when I can stop working?
  household:
    persons:
    - name: Morgan Example
      birth_year: 1970
      planned_retirement_age: 60
  balance_sheet:
    accounts:
    - account_id: trad-1
      name: trad-1
      account_type: traditional
      balance: 450000
      annual_contribution: 15000
